goal: Choose College
labels: [RIT, WPI, RPI]

# weight matrix size is either the number of subcriteria or the number of labels


criteria:
  - name: Academics
    comparisons:
      - [1, 3]
      - [0.333, 1]
    subcriteria:
      - name: Class Size
        comparisons:
          - [1, 5, 3]
          - [0.2, 1, 0.333]
          - [0.333, 3, 1]
      - name: Graduation Rate
        comparisons:
          - [1, 0.5, 4]
          - [2, 1, 5]
          - [0.25, 0.2, 1]

  - name: Cost
    comparisons:
      - [1, 2, 5]
      - [0.5, 1, 3]
      - [0.2, 0.333, 1]